<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Konverter – KryptoDashboard</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<nav><div class="nav-inner">
  <a href="../index.html" class="nav-brand">₿ <span>KRYPTO</span>DASHBOARD</a>
  <button id="nav-toggle" class="nav-toggle" aria-label="Menü"><svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="2" y1="6" x2="20" y2="6"/><line x1="2" y1="11" x2="20" y2="11"/><line x1="2" y1="16" x2="20" y2="16"/></svg></button>
  <ul class="nav-links" id="nav-links">
    <li><a href="../index.html">Dashboard</a></li><li><a href="watchlist.html">⭐ Watchlist</a></li><li><a href="konverter.html" class="active">⇄ Konverter</a></li>
  </ul>
</div></nav>
<div class="page-header"><div class="page-header-inner"><h1>⇄ <em>KRYPTO</em>KONVERTER</h1></div></div>
<main>
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:2rem;max-width:540px;margin:0 auto">
    <div id="loading" class="loading" style="min-height:auto;padding:2rem 0"><div class="spinner"></div><span>Lade Kurse…</span></div>
    <div id="converter" style="display:none">
      <div style="margin-bottom:1rem">
        <label style="font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;display:block;margin-bottom:.35rem">Betrag</label>
        <input type="number" id="amount" value="1" min="0" step="any" oninput="convert()" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--white);font-family:var(--mono);font-size:1.4rem;padding:.65rem 1rem">
      </div>
      <div style="margin-bottom:1rem">
        <label style="font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;display:block;margin-bottom:.35rem">Von</label>
        <select id="from-coin" onchange="convert()" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--white);font-size:.95rem;padding:.6rem .85rem"></select>
      </div>
      <div style="text-align:center;font-size:1.5rem;color:var(--orange);cursor:pointer;margin:.5rem 0" onclick="swapCoins()">⇅</div>
      <div style="margin-bottom:1.5rem">
        <label style="font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;display:block;margin-bottom:.35rem">In</label>
        <select id="to-coin" onchange="convert()" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--white);font-size:.95rem;padding:.6rem .85rem"></select>
      </div>
      <div style="background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:1.25rem;text-align:center">
        <div id="result-label" style="font-size:.78rem;color:var(--muted);margin-bottom:.4rem"></div>
        <div id="result" style="font-family:var(--mono);font-size:2rem;font-weight:700;color:var(--orange)">–</div>
      </div>
      <div style="margin-top:1rem;font-size:.75rem;color:var(--muted);text-align:center" id="rates-info"></div>
    </div>
  </div>
</main>
<footer><p>Kursdaten: <a href="https://coingecko.com" target="_blank">CoinGecko</a> Free API – <a href="../index.html">Dashboard</a></p></footer>
<script>
let prices = {};
const FIAT = [['usd','US-Dollar (USD)'],['eur','Euro (EUR)'],['gbp','Britisches Pfund (GBP)'],['jpy','Japanischer Yen (JPY)'],['chf','Schweizer Franken (CHF)']];
const TOP_IDS = ['bitcoin','ethereum','tether','binancecoin','solana','ripple','usd-coin','cardano','dogecoin','polkadot'];

async function load(){
  const ids = TOP_IDS.join(',');
  const fiats = FIAT.map(f=>f[0]).join(',');
  const r = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=${fiats},usd`);
  const data = await r.json();

  const r2 = await fetch(`https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=${ids}&per_page=10&page=1`);
  const meta = await r2.json();

  prices = {};
  meta.forEach(c => {
    prices[c.id] = { name: c.name, symbol: c.symbol.toUpperCase(), priceUSD: c.current_price };
  });
  FIAT.forEach(([id,name]) => { prices[id] = { name, symbol: id.toUpperCase(), priceUSD: 1/(data.bitcoin?.[id]||1) * data.bitcoin?.usd }; });

  const fromSel = document.getElementById('from-coin');
  const toSel = document.getElementById('to-coin');
  const opts = [...meta.map(c=>`<option value="${c.id}">${c.name} (${c.symbol.toUpperCase()})</option>`), ...FIAT.map(([id,name])=>`<option value="${id}">${name}</option>`)];
  fromSel.innerHTML = opts.join('');
  toSel.innerHTML = opts.join('');
  toSel.value = 'eur';

  document.getElementById('loading').style.display = 'none';
  document.getElementById('converter').style.display = 'block';
  convert();
}

function convert(){
  const amount = parseFloat(document.getElementById('amount').value)||0;
  const from = document.getElementById('from-coin').value;
  const to = document.getElementById('to-coin').value;
  if(!prices[from]||!prices[to]) return;
  const usdAmount = amount * prices[from].priceUSD;
  const result = usdAmount / prices[to].priceUSD;
  const fmt = n => n >= 0.01 ? new Intl.NumberFormat('de-DE',{minimumFractionDigits:2,maximumFractionDigits:8}).format(n) : n.toExponential(4);
  document.getElementById('result').textContent = `${fmt(result)} ${prices[to].symbol}`;
  document.getElementById('result-label').textContent = `${amount} ${prices[from].symbol} =`;
  document.getElementById('rates-info').textContent = `1 ${prices[from].symbol} = ${fmt(prices[from].priceUSD / prices[to].priceUSD)} ${prices[to].symbol}`;
}

function swapCoins(){
  const f=document.getElementById('from-coin'),t=document.getElementById('to-coin');
  [f.value,t.value]=[t.value,f.value]; convert();
}

(function(){const tg=document.getElementById('nav-toggle'),l=document.getElementById('nav-links');if(tg&&l)tg.addEventListener('click',()=>l.classList.toggle('open'));})();
load();
</script>
</body></html>
